name: Deploy OpenClaw

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
    steps:
      - name: Trigger deploy via webhook
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: |
          SIGNATURE=$(echo -n '{}' | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $2}')
          curl -s -X POST \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${DEPLOY_WEBHOOK_URL}" \
            || echo "Webhook delivery attempted"

      - name: Deploy via SSH (fallback)
        if: env.SSH_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR || '/home/yui/huahwa-bot' }}
            bash deploy.sh
