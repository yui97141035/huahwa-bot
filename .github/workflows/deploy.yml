name: Deploy OpenClaw

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          curl -s -X POST \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | awk '{print $2}')" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            || echo "Webhook delivery attempted"

      - name: Deploy via SSH (fallback)
        if: ${{ secrets.SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR || '/home/yui/huahwa-bot' }}
            bash deploy.sh
